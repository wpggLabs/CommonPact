name: Validate project alignment

on:
  pull_request:
    paths:
      - "README.md"
      - "FOUNDER_VISION.md"
      - "STATUS.md"
      - "ROADMAP.md"
      - "USE_CASES_AND_USER_JOURNEYS.md"
      - "CORE_PROFILE_MAPPING.md"
      - "ADOPTION_AND_NETWORK_BOOTSTRAP.md"
      - "ACCESSIBILITY.md"
      - "ABUSE_AND_MODERATION.md"
      - "KEY_MANAGEMENT_AND_RECOVERY.md"
      - "DATA_PORTABILITY.md"
      - "LEGAL_REVIEW_CHECKLIST.md"
      - "docs/**"
      - "scripts/validate_project_alignment.py"
      - ".github/workflows/project-alignment.yml"
  push:
    branches: [main]
    paths:
      - "README.md"
      - "FOUNDER_VISION.md"
      - "STATUS.md"
      - "ROADMAP.md"
      - "USE_CASES_AND_USER_JOURNEYS.md"
      - "CORE_PROFILE_MAPPING.md"
      - "ADOPTION_AND_NETWORK_BOOTSTRAP.md"
      - "ACCESSIBILITY.md"
      - "ABUSE_AND_MODERATION.md"
      - "KEY_MANAGEMENT_AND_RECOVERY.md"
      - "DATA_PORTABILITY.md"
      - "LEGAL_REVIEW_CHECKLIST.md"
      - "docs/**"
      - "scripts/validate_project_alignment.py"
      - ".github/workflows/project-alignment.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-alignment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/validate_project_alignment.py
