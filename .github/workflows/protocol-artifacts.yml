name: Validate protocol artifacts

on:
  pull_request:
    paths:
      - "PROTOCOL.md"
      - "PACT_LIFECYCLE.md"
      - "PROFILE_STANDARD.md"
      - "schemas/**"
      - "profiles/**"
      - "test-vectors/**"
      - "examples/**"
      - "requirements-dev.txt"
      - "scripts/validate_protocol_artifacts.py"
      - ".github/workflows/protocol-artifacts.yml"
  push:
    branches: [main]
    paths:
      - "PROTOCOL.md"
      - "PACT_LIFECYCLE.md"
      - "PROFILE_STANDARD.md"
      - "schemas/**"
      - "profiles/**"
      - "test-vectors/**"
      - "examples/**"
      - "requirements-dev.txt"
      - "scripts/validate_protocol_artifacts.py"
      - ".github/workflows/protocol-artifacts.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-protocol-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python scripts/validate_protocol_artifacts.py
